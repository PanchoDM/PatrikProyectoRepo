spring:
  application:
    name: torre-control-backend

  # --- Supabase Postgres -----------------------------------------------------
  # Supabase expone la cadena de conexion directa (o via pooler/PgBouncer,
  # puerto 6543) en Project Settings > Database. Usa un rol de base de datos
  # dedicado con BYPASSRLS para que el backend centralice la logica de negocio
  # (ver comentarios en db/migration/V1__init_schema.sql).
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # --- Redis: cola persistente de temporizadores/notificaciones --------------
  # TEMPORAL: comentado porque no hay servidor Redis en este entorno (Windows
  # nativo). NotificationDispatchWorker esta desactivado (@Component comentado)
  # y NotificationQueueService.enqueue() es un no-op (REDIS_ENABLED = false),
  # asi que este bloque no hace falta para arrancar. Descomentar junto con esas
  # dos clases cuando haya un Redis disponible (local o gestionado).
  # data:
  #   redis:
  #     host: ${REDIS_HOST:localhost}
  #     port: ${REDIS_PORT:6379}
  #     password: ${REDIS_PASSWORD:}
  #     username: ${REDIS_USERNAME:}
  #     ssl:
  #       enabled: ${REDIS_SSL:false}

server:
  port: ${SERVER_PORT:8080}

# ----------------------------------------------------------------------------
# Configuracion propia de la aplicacion
# ----------------------------------------------------------------------------
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

  supabase:
    url: ${SUPABASE_URL:https://your-project.supabase.co}

  # --- Keep-alive: evita que Render suspenda el servicio por inactividad -----
  # El plan free de Render apaga el dyno tras ~15 min sin trafico HTTP entrante
  # y luego tarda ~50s en volver a levantarlo (cold start) en la siguiente
  # request. KeepAliveService se autoconsulta antes de ese plazo para que
  # Render siempre vea trafico reciente. RENDER_EXTERNAL_URL lo define Render
  # automaticamente en el entorno del servicio (no hace falta configurarlo).
  keep-alive:
    enabled: ${KEEP_ALIVE_ENABLED:true}
    url: ${RENDER_EXTERNAL_URL:}
    interval-ms: 600000

  timers:
    ata-window-minutes: 40
    descarga-minutes-la: 40
    descarga-minutes-uc: 55
    rcf-hours-la: 2
    rcf-hours-uc: 3
    rcf-pre-alert-minutes: 5
    tarja-minutes: 15
    scheduler-tick-ms: 1000

  notifications:
    redis-stream-key: torre-control:notifications
    consumer-group: torre-control-workers
    max-retry: 5
    whatsapp:
      provider: twilio          # twilio | meta
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_WHATSAPP_FROM:}   # ej. whatsapp:+14155238886
    email:
      provider: sendgrid
      api-key: ${SENDGRID_API_KEY:}
      from-address: ${SENDGRID_FROM_EMAIL:alertas@torre-control.local}
      supervisor-escalation-list: ${SUPERVISOR_EMAILS:}
    push:
      vapid-public-key: ${VAPID_PUBLIC_KEY:}
      vapid-private-key: ${VAPID_PRIVATE_KEY:}
      vapid-subject: ${VAPID_SUBJECT:mailto:alertas@torre-control.local}

management:
  health:
    redis:
      # Redis solo respalda la cola de notificaciones (best-effort, ver
      # NotificationDispatchWorker). No debe marcar caido todo /actuator/health
      # ni el readiness probe si el resto del sistema (DB, timers) funciona.
      enabled: false

logging:
  level:
    com.example.backend: INFO
    org.springframework.security: WARN
